name: Build Android APK (Vite + Capacitor)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      - name: Setup Capacitor & Android Platform
        run: |
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          npx cap init "Weathering" "com.hmz64.weathering" --web-dir dist
          npx cap add android
          npx cap sync android

      # --- SCRIPT INJEKSI UNTUK FIX ERROR KOTLIN ---
      - name: Fix Kotlin Duplicate Class Conflict
        run: |
          cat <<EOF >> android/build.gradle

          // Script tambahan untuk memaksa resolusi versi Kotlin
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
