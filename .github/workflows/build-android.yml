name: Build Android APK (Vite + Capacitor)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Update ke Node 20 sesuai permintaan dependencies
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      # 2. Install semua dependencies proyek web kamu
      - name: Install Dependencies
        run: npm install

      # 3. Build proyek Vite (menghasilkan folder dist/)
      - name: Build Web App (Vite)
        run: npm run build

      # 4. Install dan Setup Capacitor untuk mengubah Web jadi Android
      - name: Setup Capacitor & Android Platform
        run: |
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          # Menginisialisasi Capacitor, arahkan ke folder hasil build Vite (dist)
          npx cap init "Weathering" "com.hmz64.weathering" --web-dir dist
          npx cap add android
          npx cap sync android

      # 5. Siapkan environment Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 6. Build APK Android
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 7. Upload hasil APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
