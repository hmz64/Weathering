name: Build Android Debug APK

on:
  push:
    branches:
      - main # Akan berjalan otomatis setiap ada push ke branch main
  workflow_dispatch: # Memungkinkan kamu menjalankan workflow secara manual dari tab "Actions"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil source code dari repositori
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Menyiapkan environment Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Versi Node yang umum digunakan untuk React Native modern
          cache: 'npm'

      # 3. Menginstal dependensi React Native
      - name: Install Dependencies
        run: npm install
        # Jika repositori menggunakan yarn, ganti menjadi: yarn install

      # 4. Menyiapkan environment Java (JDK) untuk build Android
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # JDK 17 direkomendasikan untuk Gradle versi baru

      # 5. Memberikan akses eksekusi ke file gradlew
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 6. Menjalankan proses build APK Debug
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 7. Mengunggah file APK yang sudah jadi sebagai Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # File APK akan disimpan di GitHub selama 7 hari
          
